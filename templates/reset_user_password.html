{% extends 'base.html' %}

{% block content %}

<div class="container-fluid px-3 px-md-5 mt-4">

    <div class="row justify-content-center">

       
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-dark text-white text-center rounded-top-4 py-3">
                    <h4 class="mb-0">Reset Password</h4>
                    <small>For user: {{ user_obj.username }}</small>
                </div>

                <div class="card-body p-3 p-md-4">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="password"
                                   class="form-control form-control-lg"
                                   placeholder="Enter new password" required>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-between">

                            <a href="{% url 'user_list' %}"
                               class="btn btn-secondary w-100 w-sm-auto">
                                ⬅ Back
                            </a>

                            <button type="submit"
                                    class="btn btn-warning w-100 w-sm-auto">
                                🔐 Reset Password
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
