{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow mb-4">
        <div class="card-header bg-info text-white d-flex justify-content-between">
            <h5>Employees</h5>
            <a href="{% url 'create_user' %}" class="btn btn-sm btn-light">+ Add Employee</a>
        </div>
        <div class="card-body table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-info">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Dept</th>
                        <th>Post</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for emp in employees %}
                        <tr>
                            <td>{{ emp.username }}</td>
                            <td>{{ emp.email }}</td>
                            <td>{{ emp.Dept }}</td>
                            <td>{{ emp.Post }}</td>
                            <td>
                                <a href="{% url 'edit_user' emp.id %}" class="btn btn-sm btn-warning">Edit</a>
                                <a href="{% url 'delete_user' emp.id %}" class="btn btn-sm btn-danger">Delete</a>
                            </td>
                        </tr>
                    {% empty %}
                        <tr><td colspan="5">No employees found</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
