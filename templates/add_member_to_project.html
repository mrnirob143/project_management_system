{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-9">

            <div class="card border-0 shadow-lg rounded-5 overflow-hidden">

                <div class="bg-dark text-white text-center p-4">
                    <h4 class="mb-1">👥 Add Members</h4>
                    <small class="text-light opacity-75">
                        {{ project.Name }}
                    </small>
                </div>

                <div class="card-body p-4">

                    <form method="POST">
                        {% csrf_token %}

                        <label class="form-label fw-semibold mb-2">
                            Select Employees
                        </label>

                        <div class="border rounded-4 p-2 bg-light shadow-sm">
                            <select name="user_ids"
                                    multiple
                                    class="form-select border-0 bg-transparent"
                                    size="8"
                                    style="outline:none; box-shadow:none;">

                                {% for user in unassigned_users %}
                                    <option value="{{ user.id }}">
                                        {{ user.username }} [Employee]
                                    </option>
                                {% empty %}
                                    <option disabled>No users available</option>
                                {% endfor %}

                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 mt-4 py-2 rounded-4 fw-semibold shadow-sm">
                            ➕ Add Members
                        </button>

                        <a href="{% url 'project_detail' project.ID %}"
                           class="btn btn-outline-secondary w-100 mt-2 py-2 rounded-4">
                            ← Back to Project
                        </a>

                    </form>

                    {% if messages %}
                        <div class="mt-3">
                            {% for message in messages %}
                                <div class="alert alert-success rounded-4 shadow-sm">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
